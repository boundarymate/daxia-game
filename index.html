<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大侠模拟器 · 神雕年间</title>
<style>
/* ===== 基础变量 ===== */
:root {
  --bg-deep:    #080c10;
  --bg-panel:   #0e1520;
  --bg-card:    #141c28;
  --bg-hover:   #1c2838;
  --border:     rgba(180,140,60,0.18);
  --border-h:   rgba(180,140,60,0.5);
  --gold:       #c8a84a;
  --gold-light: #e8c870;
  --gold-dim:   rgba(200,168,74,0.3);
  --red:        #c0392b;
  --red-light:  #e74c3c;
  --green:      #27ae60;
  --green-light:#2ecc71;
  --blue:       #2980b9;
  --blue-light: #3498db;
  --purple:     #8e44ad;
  --text:       #f0e0c0;
  --text-dim:   rgba(240,224,192,0.55);
  --text-muted: rgba(240,224,192,0.3);
  --shadow:     0 4px 24px rgba(0,0,0,0.7);
  --ink:        #1a0a00;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }
body {
  background:var(--bg-deep);
  color:var(--text);
  font-family:'Noto Serif SC','STSong','SimSun',serif;
  font-size:13px;
  line-height:1.65;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }

/* ===== 开始界面 ===== */
#start-screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, #1a1000 0%, #080c10 70%);
  z-index:200;
}
.start-title {
  font-size:52px; font-weight:900; letter-spacing:12px;
  color:var(--gold-light);
  text-shadow:0 0 40px rgba(200,168,74,0.6), 0 2px 0 #000;
  margin-bottom:8px;
}
.start-subtitle {
  font-size:16px; color:var(--text-dim); letter-spacing:6px;
  margin-bottom:60px;
}
.start-btn {
  padding:14px 48px; font-size:18px; letter-spacing:4px;
  border:1px solid var(--gold); color:var(--gold-light);
  background:rgba(200,168,74,0.08);
  border-radius:2px; margin:8px;
  transition:all .2s;
}
.start-btn:hover { background:rgba(200,168,74,0.18); transform:translateY(-1px); }
.start-deco {
  position:absolute; inset:0; pointer-events:none; opacity:0.03;
  background-image:repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);
  background-size:24px 24px;
}

/* ===== 人物创建界面 ===== */
#create-screen {
  position:fixed; inset:0; overflow-y:auto;
  background:var(--bg-deep); z-index:190;
  display:none;
}
.create-inner {
  max-width:900px; margin:0 auto; padding:40px 20px;
}
.create-title {
  text-align:center; font-size:28px; color:var(--gold-light);
  letter-spacing:6px; margin-bottom:8px;
}
.create-sub {
  text-align:center; color:var(--text-dim); margin-bottom:32px; font-size:13px;
}
.create-section { margin-bottom:28px; }
.create-section-title {
  font-size:15px; color:var(--gold); letter-spacing:3px;
  border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:14px;
}
.name-row { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
.name-input {
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text); padding:8px 14px; font-family:inherit; font-size:14px;
  border-radius:2px; flex:1;
}
.name-input:focus { outline:none; border-color:var(--gold); }
.gender-btn {
  padding:8px 20px; border:1px solid var(--border); color:var(--text-dim);
  border-radius:2px; transition:all .2s;
}
.gender-btn.active { border-color:var(--gold); color:var(--gold-light); background:var(--gold-dim); }

.trait-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px;
}
.trait-card {
  background:var(--bg-card); border:1px solid var(--border);
  padding:10px 12px; border-radius:2px; cursor:pointer; transition:all .2s;
  position:relative;
}
.trait-card:hover { border-color:var(--border-h); background:var(--bg-hover); }
.trait-card.selected { border-color:var(--gold); background:rgba(200,168,74,0.1); }
.trait-card.disabled { opacity:0.4; cursor:not-allowed; }
.trait-name { font-size:14px; color:var(--gold-light); margin-bottom:3px; }
.trait-desc { font-size:11px; color:var(--text-dim); }
.trait-bonus { font-size:11px; color:var(--green-light); margin-top:4px; }
.trait-count {
  text-align:center; color:var(--text-dim); font-size:12px; margin-top:8px;
}
.trait-count span { color:var(--gold-light); font-size:14px; }

.create-confirm-btn {
  display:block; width:100%; padding:14px;
  background:linear-gradient(135deg,rgba(200,168,74,0.2),rgba(200,168,74,0.1));
  border:1px solid var(--gold); color:var(--gold-light);
  font-size:16px; letter-spacing:4px; border-radius:2px;
  margin-top:24px; transition:all .2s;
}
.create-confirm-btn:hover { background:rgba(200,168,74,0.25); }
.create-confirm-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* 分数面板 */
#point-panel {
  position:sticky; top:0; z-index:10;
  background:var(--bg-panel);
  border:1px solid var(--gold);
  border-radius:3px; padding:12px 20px;
  display:flex; align-items:center; gap:16px;
  margin-bottom:20px;
  box-shadow:0 2px 16px rgba(0,0,0,0.5);
}
.point-label { font-size:13px; color:var(--text-dim); letter-spacing:2px; }
.point-value {
  font-size:32px; font-weight:900; color:var(--gold-light);
  min-width:48px; text-align:center;
  transition:color .2s, transform .15s;
}
.point-value.danger { color:var(--red-light); }
.point-value.zero   { color:var(--green-light); }
.point-hint { font-size:11px; color:var(--text-muted); flex:1; }

/* 分类标签 */
.trait-category-tabs {
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;
}
.cat-tab {
  padding:4px 14px; border:1px solid var(--border);
  color:var(--text-dim); font-size:12px; border-radius:12px;
  cursor:pointer; transition:all .2s;
}
.cat-tab:hover { border-color:var(--border-h); color:var(--text); }
.cat-tab.active { border-color:var(--gold); color:var(--gold-light); background:var(--gold-dim); }
.cat-tab .cat-count { font-size:10px; color:var(--text-muted); margin-left:3px; }
.cat-tab.active .cat-count { color:var(--gold); }

/* 特质卡片改版 */
.trait-card {
  background:var(--bg-card); border:1px solid var(--border);
  padding:10px 12px; border-radius:2px; cursor:pointer; transition:all .2s;
  position:relative;
}
.trait-card:hover { border-color:var(--border-h); background:var(--bg-hover); }
.trait-card.selected.positive { border-color:var(--gold); background:rgba(200,168,74,0.1); }
.trait-card.selected.negative { border-color:var(--red-light); background:rgba(192,57,43,0.1); }
.trait-card.disabled { opacity:0.35; cursor:not-allowed; pointer-events:none; }
.trait-name { font-size:14px; color:var(--gold-light); margin-bottom:3px; }
.trait-card.negative .trait-name { color:#e88; }
.trait-desc { font-size:11px; color:var(--text-dim); line-height:1.5; }
.trait-bonus { font-size:11px; color:var(--green-light); margin-top:4px; }
.trait-card.negative .trait-bonus { color:#f88; }
.trait-cost-badge {
  position:absolute; top:8px; right:8px;
  font-size:12px; font-weight:700; padding:2px 7px;
  border-radius:10px; line-height:1.4;
}
.cost-pos { background:rgba(200,168,74,0.2); color:var(--gold-light); border:1px solid var(--gold-dim); }
.cost-neg { background:rgba(192,57,43,0.2); color:#f99; border:1px solid rgba(192,57,43,0.3); }
.bg-tag-badge {
  display:inline-block; font-size:10px; padding:1px 6px;
  border-radius:8px; margin-bottom:4px;
  background:rgba(52,152,219,0.15); color:var(--blue-light);
  border:1px solid rgba(52,152,219,0.25);
}

/* ===== 主游戏界面 ===== */
#game-screen {
  display:none; width:100%; height:100%;
  grid-template-columns:220px 1fr 260px;
  grid-template-rows:48px 1fr;
}
#game-screen.active { display:grid; }

/* 顶部状态栏 */
#top-bar {
  grid-column:1/-1;
  background:var(--bg-panel);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 16px; gap:20px;
}
.top-name { font-size:15px; color:var(--gold-light); letter-spacing:2px; }
.top-realm { font-size:12px; color:var(--purple); padding:2px 8px; border:1px solid var(--purple); border-radius:10px; }
.top-time { font-size:12px; color:var(--text-dim); margin-left:auto; }
.top-stat { display:flex; align-items:center; gap:4px; font-size:12px; }
.top-stat-label { color:var(--text-muted); }
.top-stat-val { color:var(--text); }
.top-save-btn {
  padding:4px 12px; border:1px solid var(--border); color:var(--text-dim);
  font-size:11px; border-radius:2px; transition:all .2s;
}
.top-save-btn:hover { border-color:var(--gold); color:var(--gold); }

/* 左侧面板 */
#left-panel {
  background:var(--bg-panel);
  border-right:1px solid var(--border);
  overflow-y:auto; padding:12px;
}
.panel-title {
  font-size:12px; color:var(--gold); letter-spacing:2px;
  border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:10px;
}

/* 属性条 */
.stat-row { display:flex; align-items:center; margin-bottom:6px; gap:6px; }
.stat-label { width:40px; font-size:11px; color:var(--text-dim); flex-shrink:0; }
.stat-bar { flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.stat-fill { height:100%; border-radius:3px; transition:width .3s; }
.stat-val { width:32px; text-align:right; font-size:11px; color:var(--text); }

.hp-fill    { background:linear-gradient(90deg,#c0392b,#e74c3c); }
.inner-fill { background:linear-gradient(90deg,#2980b9,#3498db); }
.str-fill   { background:linear-gradient(90deg,#e67e22,#f39c12); }
.agi-fill   { background:linear-gradient(90deg,#27ae60,#2ecc71); }
.end-fill   { background:linear-gradient(90deg,#8e44ad,#9b59b6); }
.per-fill   { background:linear-gradient(90deg,#16a085,#1abc9c); }
.chm-fill   { background:linear-gradient(90deg,#c0392b,#e91e63); }
.swd-fill   { background:linear-gradient(90deg,#2c3e50,#34495e); }

/* 道德/声望 */
.moral-bar { margin:8px 0; }
.moral-track {
  height:8px; background:linear-gradient(90deg,#c0392b,#888,#27ae60);
  border-radius:4px; position:relative; margin-top:4px;
}
.moral-cursor {
  position:absolute; top:-2px; width:12px; height:12px;
  background:var(--gold-light); border-radius:50%;
  transform:translateX(-50%); transition:left .3s;
  box-shadow:0 0 6px rgba(200,168,74,0.8);
}

/* 武功列表 */
.martial-item {
  background:var(--bg-card); border:1px solid var(--border);
  padding:6px 8px; border-radius:2px; margin-bottom:4px;
}
.martial-name { font-size:12px; color:var(--gold-light); }
.martial-type { font-size:10px; color:var(--text-muted); }

/* 小弟/配偶 */
.follower-item {
  display:flex; align-items:center; gap:6px;
  padding:5px 8px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:2px; margin-bottom:4px;
}
.follower-name { font-size:12px; flex:1; }
.follower-loyalty { font-size:10px; color:var(--gold); }

/* 中间主区域 */
#main-panel {
  overflow-y:auto; padding:16px;
  display:flex; flex-direction:column; gap:12px;
}

/* 地点卡片 */
.location-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:14px 16px;
}
.location-name { font-size:18px; color:var(--gold-light); letter-spacing:3px; margin-bottom:4px; }
.location-desc { font-size:12px; color:var(--text-dim); margin-bottom:12px; }
.location-npcs { display:flex; flex-wrap:wrap; gap:6px; }
.npc-chip {
  padding:4px 10px; background:var(--bg-hover);
  border:1px solid var(--border); border-radius:12px;
  font-size:11px; color:var(--text-dim); cursor:pointer; transition:all .2s;
}
.npc-chip:hover { border-color:var(--gold); color:var(--gold-light); }

/* 行动按钮区 */
.action-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px;
}
.action-btn {
  background:var(--bg-card); border:1px solid var(--border);
  padding:10px 12px; border-radius:2px; text-align:left;
  transition:all .2s; cursor:pointer;
}
.action-btn:hover { border-color:var(--border-h); background:var(--bg-hover); transform:translateY(-1px); }
.action-btn:active { transform:translateY(0); }
.action-icon { font-size:18px; margin-bottom:4px; }
.action-name { font-size:13px; color:var(--gold-light); }
.action-cost { font-size:10px; color:var(--text-muted); margin-top:2px; }
.action-desc { font-size:11px; color:var(--text-dim); margin-top:2px; }

/* 地图导航 */
.map-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px;
}
.map-btn {
  background:var(--bg-card); border:1px solid var(--border);
  padding:8px 10px; border-radius:2px; text-align:center;
  cursor:pointer; transition:all .2s;
}
.map-btn:hover { border-color:var(--border-h); background:var(--bg-hover); }
.map-btn.current { border-color:var(--gold); background:var(--gold-dim); }
.map-btn-name { font-size:12px; color:var(--text); }
.map-btn-danger { font-size:10px; color:var(--text-muted); margin-top:2px; }

/* 标签页 */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:12px; }
.tab-btn {
  padding:8px 16px; font-size:12px; color:var(--text-dim);
  border-bottom:2px solid transparent; transition:all .2s; letter-spacing:1px;
}
.tab-btn.active { color:var(--gold-light); border-bottom-color:var(--gold); }
.tab-btn:hover { color:var(--text); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* 武功学习卡片 */
.martial-learn-card {
  background:var(--bg-card); border:1px solid var(--border);
  padding:10px 12px; border-radius:2px; margin-bottom:6px;
  display:flex; align-items:flex-start; gap:10px;
}
.martial-learn-info { flex:1; }
.martial-learn-name { font-size:14px; color:var(--gold-light); }
.martial-learn-desc { font-size:11px; color:var(--text-dim); margin:3px 0; }
.martial-learn-req { font-size:10px; color:var(--text-muted); }
.martial-learn-btn {
  padding:5px 12px; border:1px solid var(--gold); color:var(--gold);
  font-size:11px; border-radius:2px; transition:all .2s; flex-shrink:0;
}
.martial-learn-btn:hover { background:var(--gold-dim); }
.martial-learn-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* 任务卡片 */
.quest-card {
  background:var(--bg-card); border:1px solid var(--border);
  padding:10px 12px; border-radius:2px; margin-bottom:6px;
}
.quest-name { font-size:14px; color:var(--gold-light); margin-bottom:4px; }
.quest-desc { font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.quest-meta { display:flex; gap:12px; font-size:10px; color:var(--text-muted); margin-bottom:6px; }
.quest-reward { color:var(--green-light); }
.quest-cost { color:var(--red-light); }
.quest-btn {
  padding:5px 14px; border:1px solid var(--green); color:var(--green-light);
  font-size:11px; border-radius:2px; transition:all .2s;
}
.quest-btn:hover { background:rgba(39,174,96,0.15); }

/* NPC面板 */
.npc-card {
  background:var(--bg-card); border:1px solid var(--border);
  padding:12px; border-radius:2px; margin-bottom:8px;
}
.npc-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.npc-avatar {
  width:40px; height:40px; border-radius:50%;
  background:var(--bg-hover); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.npc-name { font-size:14px; color:var(--gold-light); }
.npc-title { font-size:11px; color:var(--text-muted); }
.npc-align { font-size:10px; padding:1px 6px; border-radius:8px; margin-top:2px; display:inline-block; }
.align-good { background:rgba(39,174,96,0.2); color:var(--green-light); border:1px solid rgba(39,174,96,0.3); }
.align-evil { background:rgba(192,57,43,0.2); color:var(--red-light); border:1px solid rgba(192,57,43,0.3); }
.align-neutral { background:rgba(255,255,255,0.05); color:var(--text-dim); border:1px solid var(--border); }
.npc-favor-bar { height:4px; background:rgba(255,255,255,0.06); border-radius:2px; margin:6px 0; }
.npc-favor-fill { height:100%; background:linear-gradient(90deg,var(--red),var(--gold),var(--green)); border-radius:2px; transition:width .3s; }
.npc-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.npc-action-btn {
  padding:4px 10px; border:1px solid var(--border); color:var(--text-dim);
  font-size:11px; border-radius:2px; transition:all .2s;
}
.npc-action-btn:hover { border-color:var(--gold); color:var(--gold-light); }

/* 门派面板 */
.sect-card {
  background:var(--bg-card); border:1px solid var(--border);
  padding:12px; border-radius:2px; margin-bottom:8px;
}
.sect-name { font-size:15px; color:var(--gold-light); letter-spacing:2px; margin-bottom:4px; }
.sect-desc { font-size:11px; color:var(--text-dim); margin-bottom:8px; }
.sect-rank-bar { margin:8px 0; }
.sect-rank-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
.sect-rank-track { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; }
.sect-rank-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:3px; transition:width .3s; }
.sect-join-btn {
  padding:6px 16px; border:1px solid var(--gold); color:var(--gold-light);
  font-size:12px; border-radius:2px; transition:all .2s;
}
.sect-join-btn:hover { background:var(--gold-dim); }

/* 右侧日志面板 */
#right-panel {
  background:var(--bg-panel);
  border-left:1px solid var(--border);
  overflow-y:auto; padding:12px;
  display:flex; flex-direction:column;
}
.log-entry {
  padding:6px 8px; border-radius:2px; margin-bottom:4px;
  font-size:12px; line-height:1.6; border-left:2px solid transparent;
}
.log-normal  { color:var(--text-dim); border-left-color:var(--border); }
.log-story   { color:var(--text); border-left-color:var(--gold-dim); background:rgba(200,168,74,0.04); }
.log-success { color:var(--green-light); border-left-color:var(--green); background:rgba(39,174,96,0.06); }
.log-danger  { color:var(--red-light); border-left-color:var(--red); background:rgba(192,57,43,0.06); }
.log-warn    { color:#f39c12; border-left-color:#e67e22; }
.log-gold    { color:var(--gold-light); border-left-color:var(--gold); }
.log-info    { color:var(--blue-light); border-left-color:var(--blue); }
.log-dialog  { color:var(--text); border-left-color:var(--purple); background:rgba(142,68,173,0.06); font-style:italic; }
.log-time    { font-size:10px; color:var(--text-muted); margin-top:1px; }

/* ===== 模态框 ===== */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  display:flex; align-items:center; justify-content:center;
  z-index:300; backdrop-filter:blur(2px);
}
.modal-box {
  background:var(--bg-panel); border:1px solid var(--border);
  border-radius:4px; padding:24px; max-width:520px; width:90%;
  max-height:80vh; overflow-y:auto;
  box-shadow:var(--shadow);
}
.modal-title {
  font-size:18px; color:var(--gold-light); letter-spacing:3px;
  margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:10px;
}
.modal-desc { font-size:13px; color:var(--text-dim); margin-bottom:16px; line-height:1.8; }
.modal-choices { display:flex; flex-direction:column; gap:8px; }
.modal-choice-btn {
  background:var(--bg-card); border:1px solid var(--border);
  padding:10px 14px; border-radius:2px; text-align:left;
  font-size:13px; color:var(--text); transition:all .2s; cursor:pointer;
}
.modal-choice-btn:hover { border-color:var(--gold); background:var(--bg-hover); color:var(--gold-light); }
.modal-close-btn {
  margin-top:14px; padding:8px 24px; border:1px solid var(--border);
  color:var(--text-dim); font-size:12px; border-radius:2px; transition:all .2s;
}
.modal-close-btn:hover { border-color:var(--gold); color:var(--gold); }

/* 结局界面 */
#ending-screen {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  display:none; align-items:center; justify-content:center;
  z-index:400; flex-direction:column;
}
.ending-title { font-size:42px; color:var(--gold-light); letter-spacing:8px; margin-bottom:16px; }
.ending-name  { font-size:24px; color:var(--text); letter-spacing:4px; margin-bottom:24px; }
.ending-desc  { font-size:15px; color:var(--text-dim); max-width:500px; text-align:center; line-height:2; margin-bottom:32px; }
.ending-restart { padding:12px 36px; border:1px solid var(--gold); color:var(--gold-light); font-size:15px; letter-spacing:3px; border-radius:2px; transition:all .2s; }
.ending-restart:hover { background:var(--gold-dim); }

/* 通知提示 */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--bg-panel); border:1px solid var(--gold);
  color:var(--gold-light); padding:10px 24px; border-radius:2px;
  font-size:13px; z-index:500; opacity:0; transition:opacity .3s;
  pointer-events:none;
}
#toast.show { opacity:1; }

/* 武器展示 */
.weapon-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 8px; background:var(--bg-card);
  border:1px solid var(--border); border-radius:2px; margin-bottom:4px;
  cursor:pointer; transition:all .2s;
}
.weapon-item:hover { border-color:var(--gold); }
.weapon-item.equipped { border-color:var(--gold); background:var(--gold-dim); }
.weapon-tier { font-size:10px; color:var(--gold); }
.weapon-name { font-size:12px; flex:1; }
.weapon-bonus { font-size:10px; color:var(--green-light); }

/* 响应式 */
@media (max-width:900px) {
  #game-screen { grid-template-columns:180px 1fr 220px; }
}
</style>
</head>
<body>

<!-- ===== 开始界面 ===== -->
<div id="start-screen">
  <div class="start-deco"></div>
  <div class="start-title">大侠模拟器</div>
  <div class="start-subtitle">神雕年间 · 郭靖守襄阳</div>
  <button class="start-btn" onclick="UI.showCreate()">开始新游戏</button>
  <button class="start-btn" onclick="UI.loadGame()" style="font-size:14px;padding:10px 36px;">读取存档</button>
</div>

<!-- ===== 人物创建界面 ===== -->
<div id="create-screen">
  <div class="create-inner">
    <div class="create-title">创建人物</div>
    <div class="create-sub">你的选择，决定了你在江湖中的起点</div>

    <!-- 姓名性别 + 分数显示 -->
    <div class="create-section">
      <div class="create-section-title">基本信息</div>
      <div class="name-row">
        <input class="name-input" id="char-name" placeholder="输入你的名字" maxlength="8" value="无名侠客">
        <button class="gender-btn active" id="btn-male" onclick="UI.setGender('male')">男</button>
        <button class="gender-btn" id="btn-female" onclick="UI.setGender('female')">女</button>
      </div>
    </div>

    <!-- 分数面板（固定在顶部） -->
    <div id="point-panel">
      <div class="point-label">剩余点数</div>
      <div class="point-value" id="point-value">20</div>
      <div class="point-hint">正面特质消耗点数，负面特质返还点数，最终点数须 ≥ 0</div>
    </div>

    <!-- 人物特质（分类展示） -->
    <div class="create-section">
      <div class="create-section-title">人物特质 <span style="font-size:11px;color:var(--text-muted);font-weight:normal;letter-spacing:0;">（可自由选择，无数量限制）</span></div>
      <div id="trait-tabs" class="trait-category-tabs"></div>
      <div class="trait-grid" id="trait-grid"></div>
    </div>

    <!-- 背景特质（三类各选一个） -->
    <div class="create-section">
      <div class="create-section-title">背景特质 <span style="font-size:11px;color:var(--text-muted);font-weight:normal;letter-spacing:0;">（出身 / 经历 / 际遇 各选一个）</span></div>
      <div id="bg-tabs" class="trait-category-tabs"></div>
      <div class="trait-grid" id="bg-grid"></div>
    </div>

    <!-- 属性预览 -->
    <div class="create-section">
      <div class="create-section-title">初始属性预览</div>
      <div id="attr-preview" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"></div>
    </div>

    <button class="create-confirm-btn" id="confirm-btn" onclick="UI.confirmCreate()">踏入江湖</button>
  </div>
</div>

<!-- ===== 主游戏界面 ===== -->
<div id="game-screen">

  <!-- 顶部状态栏 -->
  <div id="top-bar">
    <span class="top-name" id="top-name">无名侠客</span>
    <span class="top-realm" id="top-realm">后天境</span>
    <span id="top-title" style="font-size:10px;color:var(--purple);border:1px solid var(--purple);padding:1px 6px;border-radius:8px;display:none;"></span>
    <div class="top-stat">
      <span class="top-stat-label">气血</span>
      <span class="top-stat-val" id="top-hp">100/100</span>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">内力</span>
      <span class="top-stat-val" id="top-inner">10</span>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">声望</span>
      <span class="top-stat-val" id="top-rep">0</span>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">银两</span>
      <span class="top-stat-val" id="top-gold">50</span>
    </div>
    <div class="top-stat">
      <span class="top-stat-label">体力</span>
      <span class="top-stat-val" id="top-energy">100</span>
    </div>
    <span class="top-time" id="top-time">第1年1月</span>
    <button class="top-save-btn" onclick="UI.saveGame()">存档</button>
  </div>

  <!-- 左侧属性面板 -->
  <div id="left-panel">
    <div class="panel-title">人物属性</div>

    <div id="stat-bars"></div>

    <!-- 道德条 -->
    <div class="moral-bar">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);">
        <span>极恶</span><span>道德</span><span>极善</span>
      </div>
      <div class="moral-track">
        <div class="moral-cursor" id="moral-cursor"></div>
      </div>
    </div>

    <div style="margin:10px 0 6px;font-size:10px;color:var(--text-muted);">
      邪气：<span id="evil-val" style="color:var(--red-light)">0</span>
    </div>

    <div class="panel-title" style="margin-top:12px;">已学武功</div>
    <div id="martial-list"></div>

    <div class="panel-title" style="margin-top:12px;">神兵利器</div>
    <div id="weapon-list"></div>

    <div class="panel-title" style="margin-top:12px;">门派</div>
    <div id="sect-info"></div>

    <div class="panel-title" style="margin-top:12px;">手下 / 伴侣</div>
    <div id="follower-list"></div>
  </div>

  <!-- 中间主面板 -->
  <div id="main-panel">

    <!-- 地点信息 -->
    <div class="location-card" id="location-card">
      <div class="location-name" id="loc-name">清风镇</div>
      <div class="location-desc" id="loc-desc">一个宁静的小镇</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">当地人物：</div>
      <div class="location-npcs" id="loc-npcs"></div>
    </div>

    <!-- 标签页 -->
    <div>
      <div class="tabs">
        <button class="tab-btn active" onclick="UI.switchTab('actions')">行动</button>
        <button class="tab-btn" onclick="UI.switchTab('map')">地图</button>
        <button class="tab-btn" onclick="UI.switchTab('martial')">武学</button>
        <button class="tab-btn" onclick="UI.switchTab('quests')">任务</button>
        <button class="tab-btn" onclick="UI.switchTab('npcs')">人物</button>
        <button class="tab-btn" onclick="UI.switchTab('sects')">门派</button>
        <button class="tab-btn" onclick="UI.switchTab('bag')">背包</button>
        <button class="tab-btn" onclick="UI.switchTab('titles')">称号</button>
      </div>

      <!-- 行动 -->
      <div class="tab-content active" id="tab-actions">
        <div class="action-grid" id="action-grid"></div>
      </div>

      <!-- 地图 -->
      <div class="tab-content" id="tab-map">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">选择目的地（消耗1个月+旅费）</div>
        <div class="map-grid" id="map-grid"></div>
      </div>

      <!-- 武学 -->
      <div class="tab-content" id="tab-martial">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">可学武功（需满足条件）</div>
        <div id="martial-learn-list"></div>
      </div>

      <!-- 任务 -->
      <div class="tab-content" id="tab-quests">
        <div id="quest-list"></div>
      </div>

      <!-- 人物 -->
      <div class="tab-content" id="tab-npcs">
        <div id="npc-list"></div>
      </div>

      <!-- 门派 -->
      <div class="tab-content" id="tab-sects">
        <div id="sect-list"></div>
      </div>

      <!-- 背包 -->
      <div class="tab-content" id="tab-bag">
        <div id="bag-panel"></div>
      </div>

      <!-- 称号 -->
      <div class="tab-content" id="tab-titles">
        <div id="titles-panel"></div>
      </div>
    </div>
  </div>

  <!-- 右侧日志面板 -->
  <div id="right-panel">
    <div class="panel-title">江湖日志</div>
    <div id="log-list"></div>
  </div>

</div>

<!-- ===== 事件模态框 ===== -->
<div class="modal-overlay" id="event-modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title" id="event-title">江湖奇遇</div>
    <div class="modal-desc" id="event-desc"></div>
    <div class="modal-choices" id="event-choices"></div>
  </div>
</div>

<!-- ===== NPC交互模态框 ===== -->
<div class="modal-overlay" id="npc-modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title" id="npc-modal-name"></div>
    <div class="modal-desc" id="npc-modal-desc"></div>
    <div class="modal-choices" id="npc-modal-actions"></div>
    <button class="modal-close-btn" onclick="UI.closeModal('npc-modal')">离开</button>
  </div>
</div>

<!-- ===== 结局界面 ===== -->
<div id="ending-screen">
  <div class="ending-title">江湖终章</div>
  <div class="ending-name" id="ending-name"></div>
  <div class="ending-desc" id="ending-desc"></div>
  <button class="ending-restart" onclick="location.reload()">重新开始</button>
</div>

<!-- ===== 通知 ===== -->
<div id="toast"></div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="ui.js"></script>
</body>
</html>
